<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Vibecode Voice Sequence</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #050506;
      color: #f6f1e8;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #050506;
    }

    body {
      min-height: 100vh;
    }

    canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      z-index: 2;
      pointer-events: none;
    }

    .camera-feed {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
      filter: saturate(0.9) contrast(1.08) brightness(0.66);
      background: #050506;
      z-index: 0;
    }

    .camera-shade {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 50% 48%, rgba(0, 0, 0, 0.1), rgba(0, 0, 0, 0.52) 68%),
        linear-gradient(180deg, rgba(5, 5, 6, 0.18), rgba(5, 5, 6, 0.42));
      z-index: 1;
      pointer-events: none;
    }

    .stage {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      padding: clamp(20px, 5vw, 72px);
      pointer-events: none;
      z-index: 3;
      opacity: 0;
      visibility: hidden;
    }

    .phrase {
      width: min(1080px, 92vw);
      margin: 0;
      text-align: center;
      font-size: clamp(42px, 8vw, 118px);
      line-height: 0.98;
      font-weight: 690;
      letter-spacing: 0;
      color: #fff9ee;
      text-shadow: 0 0 26px rgba(255, 218, 158, 0.23), 0 18px 52px rgba(0, 0, 0, 0.42);
      transition: opacity 520ms ease, transform 520ms ease, filter 520ms ease;
      word-break: normal;
      overflow-wrap: anywhere;
    }

    #phrase {
      position: absolute;
      left: -10000px;
      width: 1px;
      height: 1px;
      overflow: hidden;
    }

    .phrase.switching {
      opacity: 0;
      transform: translateY(12px) scale(0.985);
      filter: blur(10px);
    }

    .hud {
      position: fixed;
      left: 22px;
      right: 22px;
      bottom: 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      color: rgba(255, 249, 238, 0.78);
      pointer-events: none;
      font-size: 14px;
      letter-spacing: 0;
      z-index: 4;
      opacity: 0;
      visibility: hidden;
    }

    .status,
    .heard {
      max-width: min(48vw, 560px);
      min-height: 22px;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .controls {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background: radial-gradient(circle at 50% 46%, rgba(235, 190, 122, 0.12), rgba(0, 0, 0, 0) 38%);
      pointer-events: none;
      z-index: 5;
    }

    .start {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: min(320px, 82vw);
      width: 68px;
      min-height: 58px;
      border: 1px solid rgba(255, 241, 215, 0.28);
      border-radius: 8px;
      color: #fff9ee;
      background: rgba(12, 12, 12, 0.58);
      box-shadow: 0 18px 58px rgba(0, 0, 0, 0.44), inset 0 1px 0 rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(18px);
      font: inherit;
      font-size: 16px;
      cursor: pointer;
      pointer-events: auto;
      transition: transform 180ms ease, border-color 180ms ease, background 180ms ease;
    }

    .start:hover {
      transform: translateY(-1px);
      border-color: rgba(255, 241, 215, 0.54);
      background: rgba(22, 20, 18, 0.72);
    }

    .start:active {
      transform: translateY(0);
    }

    .mic-dot {
      width: 14px;
      height: 14px;
      border-radius: 999px;
      background: #d95f42;
      box-shadow: 0 0 0 0 rgba(217, 95, 66, 0.56);
    }

    .listening .mic-dot {
      background: #73d18a;
      animation: pulse 1.28s ease-in-out infinite;
    }

    .complete {
      background: #050506;
    }

    .complete .stage,
    .complete .hud,
    .complete .controls {
      opacity: 0;
      visibility: hidden;
      transition: opacity 900ms ease, visibility 900ms ease;
    }

    .confirmed {
      display: none;
      position: fixed;
      inset: 0;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .show-confirmed .confirmed {
      opacity: 1;
      visibility: visible;
    }

    .show-hand .confirmed {
      opacity: 0;
      transform: translateY(-18px) scale(0.98);
      filter: blur(10px);
    }

    @keyframes pulse {
      0% {
        box-shadow: 0 0 0 0 rgba(115, 209, 138, 0.5);
      }
      70% {
        box-shadow: 0 0 0 14px rgba(115, 209, 138, 0);
      }
      100% {
        box-shadow: 0 0 0 0 rgba(115, 209, 138, 0);
      }
    }

    @media (max-width: 680px) {
      .hud {
        left: 16px;
        right: 16px;
        bottom: 14px;
        display: grid;
        gap: 6px;
        justify-content: stretch;
        font-size: 12px;
      }

      .status,
      .heard {
        max-width: 100%;
      }
    }
  </style>
</head>
<body>
  <video class="camera-feed" id="cameraFeed" autoplay muted playsinline></video>
  <div class="camera-shade" aria-hidden="true"></div>
  <div class="confirmed" aria-hidden="true">CONFIRMED</div>
  <main aria-live="polite">
    <p class="phrase" id="phrase">I’m ready.</p>
    <div class="stage" aria-hidden="true">
      <p class="phrase" id="visualPhrase">I’m ready.</p>
    </div>
    <div class="hud">
      <div class="status" id="status">Press start and speak the sentence on screen.</div>
      <div class="heard" id="heard"></div>
    </div>
    <div class="controls" id="controls">
      <button class="start" id="startButton" type="button" aria-label="Start camera and listening">
        <span class="mic-dot" aria-hidden="true"></span>
      </button>
    </div>
  </main>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.165.0/build/three.module.js";

    const phrases = [
      "I’m ready.",
      "I’m waiting for confirmation.",
      "I trust you.",
      "I’m listening to you.",
      "I’ll stay with you."
    ];

    const visualPhrase = document.querySelector("#visualPhrase");
    const livePhrase = document.querySelector("#phrase");
    const status = document.querySelector("#status");
    const heard = document.querySelector("#heard");
    const controls = document.querySelector("#controls");
    const startButton = document.querySelector("#startButton");
    const cameraFeed = document.querySelector("#cameraFeed");
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    let phraseIndex = 0;
    let recognition;
    let isListening = false;
    let targetEnergy = 0.12;
    let energy = 0.12;
    let nextAllowedAdvanceAt = 0;
    let audioContext;
    let cameraStream;
    let finalMode = "live";
    let finalStartedAt = 0;

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.setClearColor(0x000000, 0);
    document.body.prepend(renderer.domElement);

    const scene = new THREE.Scene();
    scene.background = null;

    const camera = new THREE.PerspectiveCamera(46, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 0, 7.1);

    const group = new THREE.Group();
    scene.add(group);

    const fieldGeometry = new THREE.BufferGeometry();
    const count = 1400;
    const positions = new Float32Array(count * 3);
    const colors = new Float32Array(count * 3);
    const handTargets = new Float32Array(count * 3);
    const base = [];
    const palette = [
      new THREE.Color(0xfff1cf),
      new THREE.Color(0xb9d7ff),
      new THREE.Color(0xe07054),
      new THREE.Color(0x8ee0b4)
    ];

    for (let i = 0; i < count; i++) {
      const radius = 1.2 + Math.random() * 3.8;
      const angle = Math.random() * Math.PI * 2;
      const y = (Math.random() - 0.5) * 4.8;
      positions[i * 3] = Math.cos(angle) * radius;
      positions[i * 3 + 1] = y;
      positions[i * 3 + 2] = Math.sin(angle) * radius * 0.48;
      base.push({ radius, angle, y, drift: Math.random() * Math.PI * 2 });

      const color = palette[Math.floor(Math.random() * palette.length)].clone();
      color.multiplyScalar(0.58 + Math.random() * 0.42);
      colors[i * 3] = color.r;
      colors[i * 3 + 1] = color.g;
      colors[i * 3 + 2] = color.b;
    }

    function insideRoundedFinger(x, y, cx, bottom, top, radius) {
      if (y < bottom || y > top) return false;
      const capY = Math.min(Math.max(y, bottom + radius), top - radius);
      const dx = x - cx;
      const dy = y - capY;
      return dx * dx + dy * dy <= radius * radius;
    }

    function insidePalm(x, y) {
      const nx = x / 1.08;
      const ny = (y + 0.75) / 1.16;
      return nx * nx + ny * ny <= 1;
    }

    function insideThumb(x, y) {
      const angle = -0.64;
      const cx = -1.08;
      const cy = -0.34;
      const dx = x - cx;
      const dy = y - cy;
      const rx = Math.cos(angle) * dx - Math.sin(angle) * dy;
      const ry = Math.sin(angle) * dx + Math.cos(angle) * dy;
      return Math.abs(rx) < 0.34 && ry > -0.2 && ry < 1.35;
    }

    function insideHand(x, y) {
      return insidePalm(x, y)
        || insideThumb(x, y)
        || insideRoundedFinger(x, y, -0.62, -0.18, 1.9, 0.25)
        || insideRoundedFinger(x, y, -0.2, -0.08, 2.32, 0.27)
        || insideRoundedFinger(x, y, 0.24, -0.12, 2.14, 0.26)
        || insideRoundedFinger(x, y, 0.65, -0.22, 1.62, 0.23);
    }

    function createHandTargets() {
      for (let i = 0; i < count; i++) {
        let x = 0;
        let y = 0;
        let tries = 0;
        do {
          x = -1.65 + Math.random() * 3.25;
          y = -1.95 + Math.random() * 4.45;
          tries += 1;
        } while (!insideHand(x, y) && tries < 120);

        handTargets[i * 3] = x * 1.32;
        handTargets[i * 3 + 1] = y * 1.32 - 0.25;
        handTargets[i * 3 + 2] = (Math.random() - 0.5) * 0.16;
      }
    }

    createHandTargets();

    fieldGeometry.setAttribute("position", new THREE.BufferAttribute(positions, 3));
    fieldGeometry.setAttribute("color", new THREE.BufferAttribute(colors, 3));

    const points = new THREE.Points(
      fieldGeometry,
      new THREE.PointsMaterial({
        size: 0.026,
        vertexColors: true,
        transparent: true,
        opacity: 0.72,
        depthWrite: false,
        blending: THREE.AdditiveBlending
      })
    );
    group.add(points);

    const textParticleCount = 3600;
    const textPositions = new Float32Array(textParticleCount * 3);
    const textTargets = new Float32Array(textParticleCount * 3);
    const textColors = new Float32Array(textParticleCount * 3);
    const textCanvas = document.createElement("canvas");
    const textContext = textCanvas.getContext("2d", { willReadFrequently: true });
    const textColor = new THREE.Color(0xfff3d8);
    let textActiveCount = 0;
    let textOpacity = 1;

    for (let i = 0; i < textParticleCount; i++) {
      textPositions[i * 3] = (Math.random() - 0.5) * 7;
      textPositions[i * 3 + 1] = (Math.random() - 0.5) * 4;
      textPositions[i * 3 + 2] = (Math.random() - 0.5) * 0.5;
      textTargets[i * 3] = textPositions[i * 3];
      textTargets[i * 3 + 1] = textPositions[i * 3 + 1];
      textTargets[i * 3 + 2] = textPositions[i * 3 + 2];
      textColors[i * 3] = textColor.r;
      textColors[i * 3 + 1] = textColor.g;
      textColors[i * 3 + 2] = textColor.b;
    }

    const textGeometry = new THREE.BufferGeometry();
    textGeometry.setAttribute("position", new THREE.BufferAttribute(textPositions, 3));
    textGeometry.setAttribute("color", new THREE.BufferAttribute(textColors, 3));
    textGeometry.setDrawRange(0, textParticleCount);

    const textParticles = new THREE.Points(
      textGeometry,
      new THREE.PointsMaterial({
        size: 0.034,
        vertexColors: true,
        transparent: true,
        opacity: 1,
        depthWrite: false,
        blending: THREE.AdditiveBlending
      })
    );
    textParticles.position.z = 0.55;
    scene.add(textParticles);

    function setParticleText(text, { uppercase = false, scale = 1 } = {}) {
      const output = uppercase ? text.toUpperCase() : text;
      textCanvas.width = 1600;
      textCanvas.height = 420;
      textContext.clearRect(0, 0, textCanvas.width, textCanvas.height);
      textContext.fillStyle = "white";
      textContext.textAlign = "center";
      textContext.textBaseline = "middle";

      let fontSize = output.length > 24 ? 116 : 150;
      do {
        textContext.font = `760 ${fontSize}px Inter, Arial, sans-serif`;
        fontSize -= 4;
      } while (textContext.measureText(output).width > 1440 && fontSize > 66);

      textContext.fillText(output, textCanvas.width / 2, textCanvas.height / 2);
      const image = textContext.getImageData(0, 0, textCanvas.width, textCanvas.height).data;
      const sampled = [];
      const step = output.length > 24 ? 7 : 6;

      for (let y = 0; y < textCanvas.height; y += step) {
        for (let x = 0; x < textCanvas.width; x += step) {
          const alpha = image[(y * textCanvas.width + x) * 4 + 3];
          if (alpha > 90) sampled.push([x, y]);
        }
      }

      for (let i = sampled.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [sampled[i], sampled[j]] = [sampled[j], sampled[i]];
      }

      textActiveCount = Math.min(textParticleCount, sampled.length);
      textGeometry.setDrawRange(0, textActiveCount);
      textOpacity = 1;

      for (let i = 0; i < textParticleCount; i++) {
        if (i < textActiveCount) {
          const [x, y] = sampled[i];
          textTargets[i * 3] = ((x / textCanvas.width) - 0.5) * 7.4 * scale;
          textTargets[i * 3 + 1] = (0.5 - (y / textCanvas.height)) * 2.08 * scale;
          textTargets[i * 3 + 2] = 0.55 + (Math.random() - 0.5) * 0.1;
        } else {
          textTargets[i * 3] = (Math.random() - 0.5) * 8;
          textTargets[i * 3 + 1] = (Math.random() - 0.5) * 5;
          textTargets[i * 3 + 2] = -1.2 + Math.random() * 0.5;
        }
      }
    }

    setParticleText(phrases[0]);

    const ringGeometry = new THREE.TorusGeometry(2.34, 0.012, 10, 180);
    const rings = [];
    const ringMaterials = [
      new THREE.MeshBasicMaterial({ color: 0xffdfad, transparent: true, opacity: 0.24 }),
      new THREE.MeshBasicMaterial({ color: 0x98d9ff, transparent: true, opacity: 0.18 }),
      new THREE.MeshBasicMaterial({ color: 0xf07b5e, transparent: true, opacity: 0.16 })
    ];

    for (let i = 0; i < 3; i++) {
      const ring = new THREE.Mesh(ringGeometry, ringMaterials[i]);
      ring.rotation.x = Math.PI / 2 + i * 0.48;
      ring.rotation.y = i * 0.68;
      ring.scale.setScalar(1 + i * 0.24);
      rings.push(ring);
      group.add(ring);
    }

    const orb = new THREE.Mesh(
      new THREE.IcosahedronGeometry(1.05, 7),
      new THREE.MeshBasicMaterial({
        color: 0xfff0d0,
        transparent: true,
        opacity: 0.085,
        wireframe: true
      })
    );
    group.add(orb);

    const normalize = (value) => value
      .toLowerCase()
      .replace(/[’‘`]/g, "'")
      .replace(/\bi\s+am\b/g, "im")
      .replace(/\bi\s+will\b/g, "ill")
      .replace(/[^\w\s\u4e00-\u9fff]/g, "")
      .replace(/\s+/g, " ")
      .trim();

    const currentTarget = () => normalize(phrases[phraseIndex]);

    function editDistance(a, b) {
      const previous = Array.from({ length: b.length + 1 }, (_, index) => index);
      const current = new Array(b.length + 1);

      for (let i = 1; i <= a.length; i++) {
        current[0] = i;
        for (let j = 1; j <= b.length; j++) {
          const cost = a[i - 1] === b[j - 1] ? 0 : 1;
          current[j] = Math.min(
            previous[j] + 1,
            current[j - 1] + 1,
            previous[j - 1] + cost
          );
        }
        previous.splice(0, previous.length, ...current);
      }

      return previous[b.length];
    }

    function wordSimilarity(spoken, target) {
      if (!spoken.includes(" ") && !target.includes(" ")) {
        const spokenChars = Array.from(spoken);
        const targetChars = Array.from(target);
        const matched = targetChars.filter((char) => spokenChars.includes(char)).length;
        return matched / targetChars.length;
      }

      const spokenWords = spoken.split(" ").filter(Boolean);
      const targetWords = target.split(" ").filter(Boolean);
      if (!spokenWords.length || !targetWords.length) return 0;

      let matched = 0;
      const used = new Set();
      for (const targetWord of targetWords) {
        const foundIndex = spokenWords.findIndex((spokenWord, index) => {
          if (used.has(index)) return false;
          if (spokenWord === targetWord) return true;
          const limit = Math.max(1, Math.floor(Math.max(spokenWord.length, targetWord.length) * 0.34));
          return editDistance(spokenWord, targetWord) <= limit;
        });

        if (foundIndex >= 0) {
          used.add(foundIndex);
          matched += 1;
        }
      }

      return matched / targetWords.length;
    }

    const isCorrect = (spoken) => {
      const cleaned = normalize(spoken);
      const target = currentTarget();
      if (!cleaned) return false;
      if (cleaned === target || cleaned.includes(target) || target.includes(cleaned)) return true;

      const compactDistance = editDistance(cleaned.replace(/\s/g, ""), target.replace(/\s/g, ""));
      const compactLimit = Math.max(2, Math.floor(target.replace(/\s/g, "").length * 0.28));
      const similarityNeeded = /[\u4e00-\u9fff]/.test(target) ? 0.55 : 0.68;
      return compactDistance <= compactLimit || wordSimilarity(cleaned, target) >= similarityNeeded;
    };

    function playDing() {
      audioContext ??= new (window.AudioContext || window.webkitAudioContext)();

      if (audioContext.state === "suspended") {
        audioContext.resume();
      }

      const now = audioContext.currentTime;
      const gain = audioContext.createGain();
      const tone = audioContext.createOscillator();
      const sparkle = audioContext.createOscillator();

      tone.type = "sine";
      tone.frequency.setValueAtTime(880, now);
      tone.frequency.exponentialRampToValueAtTime(1320, now + 0.08);

      sparkle.type = "triangle";
      sparkle.frequency.setValueAtTime(1760, now);

      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(0.22, now + 0.014);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.32);

      tone.connect(gain);
      sparkle.connect(gain);
      gain.connect(audioContext.destination);

      tone.start(now);
      sparkle.start(now + 0.035);
      tone.stop(now + 0.34);
      sparkle.stop(now + 0.24);
    }

    function setPhrase(index) {
      livePhrase.textContent = phrases[index];
      setParticleText(phrases[index]);
    }

    function finish() {
      status.textContent = "";
      heard.textContent = "";
      if (recognition) recognition.stop();
      document.body.classList.add("complete");
      renderer.setClearColor(0x000000, 0);
      finalMode = "confirmed";
      finalStartedAt = performance.now();
      document.body.classList.add("show-confirmed");
      setParticleText("CONFIRMED", { uppercase: true, scale: 1.08 });

      window.setTimeout(() => {
        document.body.classList.add("show-hand");
        finalMode = "hand";
        finalStartedAt = performance.now();
        textOpacity = 0;
      }, 1500);
    }

    function advance() {
      const now = performance.now();
      if (now < nextAllowedAdvanceAt) return;
      nextAllowedAdvanceAt = now + 900;
      playDing();
      phraseIndex += 1;
      targetEnergy = 1;

      if (phraseIndex >= phrases.length) {
        window.setTimeout(finish, 360);
        return;
      }

      setPhrase(phraseIndex);
      status.textContent = "Correct. Keep going.";
      heard.textContent = "";
    }

    async function startCamera() {
      if (!navigator.mediaDevices?.getUserMedia) {
        throw new Error("Camera not supported");
      }

      if (cameraStream) return;
      cameraStream = await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode: "user",
          width: { ideal: 1280 },
          height: { ideal: 720 }
        },
        audio: false
      });
      cameraFeed.srcObject = cameraStream;
      await cameraFeed.play();
    }

    async function startListening() {
      if (!SpeechRecognition) {
        status.textContent = "This browser does not support speech recognition. Try Chrome or Edge.";
        return;
      }

      try {
        status.textContent = "Starting camera.";
        await startCamera();
      } catch {
        status.textContent = "Camera permission is needed to show the live image.";
        return;
      }

      recognition = new SpeechRecognition();
      recognition.lang = "en-US";
      recognition.continuous = true;
      recognition.interimResults = true;
      recognition.maxAlternatives = 3;

      recognition.onstart = () => {
        isListening = true;
        document.body.classList.add("listening");
        controls.style.display = "none";
        status.textContent = "Listening.";
      };

      recognition.onresult = (event) => {
        let latest = "";
        for (let i = event.resultIndex; i < event.results.length; i++) {
          const result = event.results[i];
          latest = result[0].transcript;
          targetEnergy = result.isFinal ? 0.72 : 0.46;

          const alternatives = Array.from(result).map((item) => item.transcript);
          if (alternatives.some(isCorrect)) {
            heard.textContent = `Heard: ${latest.trim()}`;
            advance();
            break;
          }
        }

        if (latest) {
          heard.textContent = `Heard: ${latest.trim()}`;
        }
      };

      recognition.onerror = (event) => {
        status.textContent = event.error === "not-allowed"
          ? "Microphone permission is needed to continue."
          : "Listening paused. Press start again.";
        controls.style.display = "grid";
        document.body.classList.remove("listening");
      };

      recognition.onend = () => {
        isListening = false;
        document.body.classList.remove("listening");
        if (!document.body.classList.contains("complete") && phraseIndex < phrases.length) {
          controls.style.display = "grid";
          status.textContent = "Press start to resume listening.";
        }
      };

      recognition.start();
    }

    startButton.addEventListener("click", startListening);

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    const clock = new THREE.Clock();

    function animate() {
      const time = clock.getElapsedTime();
      energy += (targetEnergy - energy) * 0.055;
      targetEnergy += ((isListening ? 0.26 : 0.11) - targetEnergy) * 0.018;

      const position = fieldGeometry.attributes.position;
      if (finalMode === "hand") {
        const elapsed = Math.min(1, (performance.now() - finalStartedAt) / 1900);
        const ease = 1 - Math.pow(1 - elapsed, 3);
        points.material.opacity = 0.22 + ease * 0.76;
        points.material.size = 0.032;
        group.rotation.x *= 0.92;
        group.rotation.y *= 0.92;

        for (let i = 0; i < count; i++) {
          const wave = Math.sin(time * 2.1 + i * 0.031) * (1 - ease) * 0.42;
          const targetX = handTargets[i * 3] + Math.sin(time * 0.8 + i) * 0.012;
          const targetY = handTargets[i * 3 + 1] + Math.cos(time * 0.7 + i) * 0.012;
          const targetZ = handTargets[i * 3 + 2];

          position.array[i * 3] += (targetX + wave - position.array[i * 3]) * (0.035 + ease * 0.08);
          position.array[i * 3 + 1] += (targetY - position.array[i * 3 + 1]) * (0.035 + ease * 0.08);
          position.array[i * 3 + 2] += (targetZ - position.array[i * 3 + 2]) * (0.035 + ease * 0.08);
        }
      } else {
        points.material.opacity = finalMode === "live" ? 0.72 : 0;
        for (let i = 0; i < count; i++) {
          const item = base[i];
          const wave = Math.sin(time * 0.92 + item.drift + item.y * 0.7);
          const radius = item.radius + wave * energy * 0.24;
          const angle = item.angle + time * (0.025 + energy * 0.015);
          position.array[i * 3] = Math.cos(angle) * radius;
          position.array[i * 3 + 1] = item.y + Math.sin(time * 0.58 + item.drift) * energy * 0.19;
          position.array[i * 3 + 2] = Math.sin(angle) * radius * 0.48;
        }

        group.rotation.y = Math.sin(time * 0.14) * 0.16;
        group.rotation.x = Math.cos(time * 0.11) * 0.06;
      }
      position.needsUpdate = true;

      const textPosition = textGeometry.attributes.position;
      const textAttraction = finalMode === "confirmed" ? 0.09 : 0.075;
      if (finalMode === "hand") {
        textOpacity += (0 - textOpacity) * 0.08;
      } else if (finalMode !== "black") {
        textOpacity += (1 - textOpacity) * 0.08;
      } else {
        textOpacity += (0 - textOpacity) * 0.1;
      }

      for (let i = 0; i < textParticleCount; i++) {
        const drift = Math.sin(time * 1.7 + i * 0.19) * 0.002;
        textPosition.array[i * 3] += (textTargets[i * 3] - textPosition.array[i * 3]) * textAttraction + drift;
        textPosition.array[i * 3 + 1] += (textTargets[i * 3 + 1] - textPosition.array[i * 3 + 1]) * textAttraction;
        textPosition.array[i * 3 + 2] += (textTargets[i * 3 + 2] - textPosition.array[i * 3 + 2]) * textAttraction;
      }
      textPosition.needsUpdate = true;
      textParticles.material.opacity = textOpacity;

      orb.rotation.x += 0.002 + energy * 0.001;
      orb.rotation.y += 0.003 + energy * 0.0014;
      orb.scale.setScalar(1 + energy * 0.06 + Math.sin(time * 1.6) * 0.018);
      orb.material.opacity = finalMode === "live" ? 0.085 : 0;

      rings.forEach((ring, index) => {
        ring.rotation.z += 0.0028 * (index + 1);
        ring.material.opacity = finalMode === "live" ? (0.11 + index * 0.035) + energy * 0.08 : 0;
      });

      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }

    animate();
  </script>
</body>
</html>
